<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Productos</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    padding: 0;
  }
  /* Banners */
  .banner-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background-color: #fff;
  }
  .banner {
    padding: 10px 20px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
  }
  .banner.shipping { background-color: #4caf50; color: #fff; }
  .banner.whatsapp { background-color: #25D366; color: #fff; }

  /* Product Grid */
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 20px;
  }
  .product-card {
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    padding: 15px;
    width: 220px;
    text-align: center;
    position: relative;
  }
  .product-card img {
    width: 100%;
    border-radius: 5px;
  }
  .product-name { margin: 10px 0; font-weight: bold; }
  .product-price { color: #e91e63; font-size: 18px; margin-bottom: 10px; }
  .product-stock { margin-bottom: 10px; font-weight: bold; }
  .stock-low { color: #ff9800; }
  .stock-out { color: #f44336; }

  /* Add to Cart Button */
  .add-btn {
    background-color: #ff5722;
    color: #fff;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
  }
  .add-btn:disabled { background-color: #ccc; cursor: not-allowed; }

  /* Social Icons */
  .social {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px 0;
  }
  .social a {
    font-size: 24px;
    text-decoration: none;
    color: #fff;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .social .facebook { background-color: #3b5998; }
  .social .instagram { background-color: #e1306c; }
  .social .whatsapp { background-color: #25D366; }

  /* Reviews */
  .reviews {
    background-color: #fff;
    padding: 20px;
    margin: 20px;
    border-radius: 8px;
  }
  .review-item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
  }
</style>
</head>
<body>

<!-- Banners -->
<div class="banner-container">
  <div class="banner shipping">Shipping: MX.200.00</div>
  <div class="banner whatsapp" onclick="window.open('https://wa.me/1234567890','_blank')">WhatsApp</div>
</div>

<!-- Product Grid -->
<div class="products" id="products"></div>

<!-- Reviews -->
<div class="reviews" id="reviews">
  <h3>Reseñas de Clientes</h3>
</div>

<!-- Social Media -->
<div class="social">
  <a class="facebook" href="https://facebook.com" target="_blank">F</a>
  <a class="instagram" href="https://instagram.com" target="_blank">I</a>
  <a class="whatsapp" href="https://wa.me/1234567890" target="_blank">W</a>
</div>

<script>
  // Product Data
  const products = [
    {name: "Producto A", price: 550, stock: 2, img: "https://via.placeholder.com/200"},
    {name: "Producto B", price: 1500, stock: 3, img: "https://via.placeholder.com/200"},
    {name: "Producto C", price: 2500, stock: 1, img: "https://via.placeholder.com/200"}
  ];

  const cart = [];
  const productsContainer = document.getElementById('products');

  function renderProducts() {
    productsContainer.innerHTML = '';
    products.forEach((p, index) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      const stockClass = p.stock === 0 ? 'stock-out' : p.stock <= 2 ? 'stock-low' : '';
      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <div class="product-name">${p.name}</div>
        <div class="product-price">MX.${p.price.toLocaleString('es-MX', {minimumFractionDigits: 2})}</div>
        <div class="product-stock ${stockClass}">Stock: ${p.stock}</div>
        <button class="add-btn" ${p.stock === 0 ? 'disabled' : ''} onclick="addToCart(${index})">Agregar al Carrito</button>
      `;
      productsContainer.appendChild(card);
    });
  }

  function addToCart(index) {
    const product = products[index];
    const cartCount = cart.filter(c => c === index).length;
    if(cartCount >= product.stock){
      alert('Este producto no está disponible en stock.');
      return;
    }
    cart.push(index);
    alert(`${product.name} agregado al carrito. Total items: ${cart.length}`);
    product.stock--;
    renderProducts();
  }

  renderProducts();

  // Customer Reviews
  const reviews = [
    "Excelente producto, muy recomendable.",
    "Llegó rápido y en buen estado.",
    "Calidad superior al precio.",
    "Muy buen servicio al cliente.",
    "El tamaño es perfecto.",
    "Repetiré la compra seguro.",
    "Muy satisfecho con la compra.",
    "Entrega rápida y sin problemas.",
    "Producto tal cual la descripción.",
    "Totalmente recomendado."
  ];
  const reviewsContainer = document.getElementById('reviews');
  reviews.forEach(r => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerText = r;
    reviewsContainer.appendChild(div);
  });
</script>

</body>
</html>
