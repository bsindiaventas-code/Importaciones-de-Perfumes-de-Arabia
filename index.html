<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Productos</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #f5f5f5, #e0f7fa);
    margin: 0;
    padding: 0;
  }

  /* Banners */
  .banner-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 15px;
    flex-wrap: wrap;
  }
  .banner {
    padding: 12px 25px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    color: #fff;
    font-size: 16px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .banner:hover { transform: translateY(-3px); box-shadow: 0 6px 10px rgba(0,0,0,0.3); }
  .banner.shipping { background-color: #4caf50; }
  .banner.whatsapp { background-color: #25D366; }

  /* Products */
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 25px;
  }
  .product-card {
    background: #fff;
    border-radius: 12px;
    width: 230px;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    padding: 15px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.25); }
  .product-card img { width: 100%; border-radius: 8px; }
  .product-name { font-weight: bold; margin: 10px 0; font-size: 16px; }
  .product-price { color: #e91e63; font-size: 18px; margin-bottom: 8px; }
  .product-stock { font-weight: bold; margin-bottom: 10px; }
  .stock-low { color: #ff9800; }
  .stock-out { color: #f44336; }

  /* Add to Cart */
  .add-btn {
    background: #ff5722;
    color: #fff;
    border: none;
    padding: 12px 15px;
    font-size: 16px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .add-btn:hover { background: #e64a19; transform: scale(1.05); }
  .add-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* Social Media */
  .social {
    display: flex;
    justify-content: center;
    gap: 15px;
    padding: 20px 0;
  }
  .social a {
    width: 50px; height: 50px;
    border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 24px; color: #fff; text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .social a:hover { transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
  .facebook { background: #3b5998; }
  .instagram { background: #e1306c; }
  .whatsapp { background: #25D366; }

  /* Reviews */
  .reviews {
    background: #fff;
    padding: 20px;
    margin: 20px auto;
    max-width: 900px;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
  }
  .review-item { border-bottom: 1px solid #ddd; padding: 10px 0; }

</style>
</head>
<body>

<!-- Banners -->
<div class="banner-container">
  <div class="banner shipping">Shipping: MX$200.00</div>
  <div class="banner whatsapp" onclick="window.open('https://wa.me/521XXXXXXXXXX','_blank')">WhatsApp</div>
</div>

<!-- Products -->
<div class="products" id="products"></div>

<!-- Reviews -->
<div class="reviews" id="reviews">
  <h3>Reseñas de Clientes</h3>
</div>

<!-- Social Media -->
<div class="social">
  <a class="facebook" href="https://facebook.com/yourpage" target="_blank">F</a>
  <a class="instagram" href="https://instagram.com/yourprofile" target="_blank">I</a>
  <a class="whatsapp" href="https://wa.me/521XXXXXXXXXX" target="_blank">W</a>
</div>

<script>
  // Product Data
  const products = [
    {name:"Producto A", price:550, stock:2, img:"https://via.placeholder.com/200"},
    {name:"Producto B", price:1500, stock:3, img:"https://via.placeholder.com/200"},
    {name:"Producto C", price:2500, stock:1, img:"https://via.placeholder.com/200"}
  ];

  const cart = [];
  const productsContainer = document.getElementById('products');

  function renderProducts() {
    productsContainer.innerHTML = '';
    products.forEach((p, index) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      let stockClass = '';
      if(p.stock === 0) stockClass = 'stock-out';
      else if(p.stock <=2) stockClass = 'stock-low';
      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <div class="product-name">${p.name}</div>
        <div class="product-price">MX$${p.price.toLocaleString('es-MX', {minimumFractionDigits: 2})}</div>
        <div class="product-stock ${stockClass}">Stock: ${p.stock}</div>
        <button class="add-btn" ${p.stock===0?'disabled':''} onclick="addToCart(${index})">Agregar al Carrito</button>
      `;
      productsContainer.appendChild(card);
    });
  }

  function addToCart(index){
    const product = products[index];
    const cartCount = cart.filter(c=>c===index).length;
    if(cartCount >= product.stock){
      alert('Este producto no está disponible en stock.');
      return;
    }
    cart.push(index);
    product.stock--;
    alert(`${product.name} agregado al carrito. Total items: ${cart.length}`);
    renderProducts();
  }

  renderProducts();

  // Customer Reviews
  const reviews = [
    "Excelente producto, muy recomendable.",
    "Llegó rápido y en buen estado.",
    "Calidad superior al precio.",
    "Muy buen servicio al cliente.",
    "El tamaño es perfecto.",
    "Repetiré la compra seguro.",
    "Muy satisfecho con la compra.",
    "Entrega rápida y sin problemas.",
    "Producto tal cual la descripción.",
    "Totalmente recomendado."
  ];
  const reviewsContainer = document.getElementById('reviews');
  reviews.forEach(r=>{
    const div = document.createElement('div');
    div.className='review-item';
    div.innerText=r;
    reviewsContainer.appendChild(div);
  });
</script>

</body>
</html>
