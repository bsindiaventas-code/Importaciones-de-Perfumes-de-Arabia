
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Productos</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        margin: 0;
        padding: 0;
    }
    /* Header Banner */
    .banner {
        display: flex;
        justify-content: center;
        gap: 20px;
        background-color: #fff;
        padding: 15px 0;
        font-weight: bold;
        font-size: 18px;
    }
    .banner div {
        cursor: pointer;
    }
    /* Product Grid */
    .products {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
        gap: 20px;
    }
    .product-card {
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        padding: 15px;
        width: 220px;
        text-align: center;
        position: relative;
    }
    .product-card img {
        width: 100%;
        border-radius: 5px;
    }
    .product-name {
        margin: 10px 0;
        font-weight: bold;
    }
    .product-price {
        color: #e91e63;
        font-size: 18px;
        margin-bottom: 10px;
    }
    /* Add to Cart Button */
    .add-btn {
        background-color: #4caf50;
        color: #fff;
        border: none;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
    }
    .add-btn:disabled {
        background-color: #ccc;
        cursor: not-allowed;
    }
    /* Reviews Section */
    .reviews {
        background-color: #fff;
        padding: 20px;
        margin: 20px;
        border-radius: 8px;
    }
    .review-item {
        border-bottom: 1px solid #ddd;
        padding: 10px 0;
    }
    /* WhatsApp Icon */
    .whatsapp {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #25D366;
        color: #fff;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
</style>
</head>
<body>

<!-- Banner -->
<div class="banner">
    <div>Todos</div>
    <div>Dama:</div>
    <div>Caballero:</div>
    <div>Unisex:</div>
</div>

<!-- Product Grid -->
<div class="products" id="products">
    <!-- Products will be generated by JS -->
</div>

<!-- Reviews Section -->
<div class="reviews" id="reviews">
    <h3>Reseñas de Clientes</h3>
</div>

<!-- WhatsApp -->
<div class="whatsapp" onclick="window.open('https://wa.me/1234567890','_blank')">
    📱
</div>

<script>
    // Product Data
    const products = [
        {name: "Producto A", price: 550, stock: 5, img: "https://via.placeholder.com/200"},
        {name: "Producto B", price: 1500, stock: 2, img: "https://via.placeholder.com/200"},
        {name: "Producto C", price: 2500, stock: 3, img: "https://via.placeholder.com/200"}
    ];

    // Render Products
    const productsContainer = document.getElementById('products');
    products.forEach((p, index) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <img src="${p.img}" alt="${p.name}">
            <div class="product-name">${p.name}</div>
            <div class="product-price">MX.${p.price.toLocaleString('es-MX', {minimumFractionDigits: 2})}</div>
            <button class="add-btn" onclick="addToCart(${index})">Agregar al Carrito</button>
        `;
        productsContainer.appendChild(card);
    });

    // Cart Logic with Stock Alert
    const cart = [];
    function addToCart(index){
        const product = products[index];
        const cartCount = cart.filter(c => c === index).length;
        if(cartCount >= product.stock){
            alert('Este producto no está disponible en stock.');
            return;
        }
        cart.push(index);
        alert(`${product.name} agregado al carrito.`);
    }

    // Customer Reviews
    const reviews = [
        "Excelente producto, muy recomendable.",
        "Llegó rápido y en buen estado.",
        "Calidad superior al precio.",
        "Muy buen servicio al cliente.",
        "El tamaño es perfecto.",
        "Repetiré la compra seguro.",
        "Muy satisfecho con la compra.",
        "Entrega rápida y sin problemas.",
        "Producto tal cual la descripción.",
        "Totalmente recomendado."
    ];
    const reviewsContainer = document.getElementById('reviews');
    reviews.forEach(r => {
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerText = r;
        reviewsContainer.appendChild(div);
    });
</script>

</body>
</html>
