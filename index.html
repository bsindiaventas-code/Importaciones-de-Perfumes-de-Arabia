<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
header { background: #f2f2f2; padding: 20px; text-align: center; }
.banner { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
.banner div { padding: 10px 20px; background: #ddd; cursor: pointer; border-radius: 5px; }
.products { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
.product { border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 200px; text-align: center; }
.product img { width: 100%; height: auto; }
.price { font-weight: bold; margin-top: 10px; color: #333; }
.review-section { max-width: 600px; margin: 40px auto; }
.review { border-top: 1px solid #ccc; padding: 10px 0; }
.whatsapp { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 15px; border-radius: 50%; font-size: 24px; text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="banner">
    <div data-category="todos">Todos</div>
    <div data-category="dama">Dama</div>
    <div data-category="kawajero">Kawajero</div>
    <div data-category="unisex">Unisex</div>
  </div>
</header>

<section class="products" id="product-list">
  <!-- Products dynamically added here -->
</section>

<section class="review-section" id="reviews">
  <h3>Opiniones de clientes</h3>
</section>

<a href="https://wa.me/521XXXXXXXXXX" class="whatsapp" target="_blank">💬</a>

<script>
// Sample product data
const products = [
  { name: "Producto 1", price: 550, stock: 3, category: "dama", img: "https://via.placeholder.com/200" },
  { name: "Producto 2", price: 1500, stock: 5, category: "kawajero", img: "https://via.placeholder.com/200" },
  { name: "Producto 3", price: 230, stock: 2, category: "unisex", img: "https://via.placeholder.com/200" },
];

// Sample reviews
const reviews = [
  { user: "Juan", comment: "Excelente producto!" },
  { user: "Maria", comment: "Muy rápido el envío." },
  { user: "Luis", comment: "Recomendado 100%." },
  { user: "Ana", comment: "Calidad muy buena." },
  { user: "Carlos", comment: "Volveré a comprar." },
  { user: "Sofia", comment: "Todo perfecto." },
  { user: "Miguel", comment: "Buen precio y calidad." },
  { user: "Lucia", comment: "Muy satisfecha." },
  { user: "Pedro", comment: "Producto como se describe." },
  { user: "Elena", comment: "Servicio excelente." }
];

// Function to format price
function formatPrice(price) {
  return 'MX.' + price.toLocaleString('es-MX', { minimumFractionDigits: 2 });
}

// Render products
function renderProducts(category = "todos") {
  const container = document.getElementById("product-list");
  container.innerHTML = "";
  products
    .filter(p => category === "todos" || p.category === category)
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <h4>${p.name}</h4>
        <div class="price">${formatPrice(p.price)}</div>
        <input type="number" min="1" max="${p.stock}" value="1" id="qty-${p.name}">
        <button onclick="addToCart('${p.name}')">Añadir al carrito</button>
      `;
      container.appendChild(div);
    });
}

// Render reviews
function renderReviews() {
  const container = document.getElementById("reviews");
  reviews.slice(0, 10).forEach(r => {
    const div = document.createElement("div");
    div.className = "review";
    div.innerHTML = `<strong>${r.user}</strong>: ${r.comment}`;
    container.appendChild(div);
  });
}

// Add to cart with stock check
function addToCart(productName) {
  const product = products.find(p => p.name === productName);
  const qty = parseInt(document.getElementById(`qty-${productName}`).value);
  if(qty > product.stock) {
    alert("Este producto no tiene suficiente stock.");
  } else {
    product.stock -= qty;
    alert(`${qty} ${productName} agregado al carrito`);
    renderProducts(); // refresh stock display
  }
}

// Banner click filter
document.querySelectorAll(".banner div").forEach(div => {
  div.addEventListener("click", () => renderProducts(div.dataset.category));
});

// Initial render
renderProducts();
renderReviews();
</script>

</body>
</html>
