<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfume Árabe Original Importación</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:Arial; background:#0c0c0c; color:white; margin:0;}

header {
display:flex; justify-content:space-between; flex-wrap:wrap;
padding:15px; background:#111; border-bottom:2px solid gold;
}
header h1 {color:gold;}

.header-right {
display:flex; gap:10px; flex-wrap:wrap;
}

.header-right a, .header-right span {
padding:6px 10px; border-radius:5px; font-weight:bold; text-decoration:none;
}

.instagram {background:#E1306C; color:white;}
.facebook {background:#1877F2; color:white;}
.whatsapp {background:#25D366; color:white;}
.phone {background:#FFD700; color:black;}
.direccion {background:gold; color:black; cursor:pointer;}

#categories {text-align:center; margin:15px;}
button {padding:8px; margin:5px; border:none; border-radius:5px; background:gold; cursor:pointer;}

#products {
display:grid;
grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:10px;
}
.product {background:#111; border:1px solid gold; padding:10px; text-align:center;}
.product img {width:180px;}

#cart-toggle {
position:fixed; bottom:20px; right:20px;
background:#00BFFF; color:white;
padding:20px; border-radius:50%;
font-size:26px; cursor:pointer;
}

#cart {
position:fixed; right:-350px; top:10px;
width:300px; background:#222;
padding:10px; transition:0.5s;
}
#cart.open {right:10px;}

#cart-close {
background:red; color:white; border:none;
padding:5px; cursor:pointer;
}

#reviews {padding:10px;}
.review {border-bottom:1px solid gold; margin:8px 0;}

input, select {
width:100%; padding:8px; margin:5px 0; border-radius:5px; border:none;
}

</style>
</head>

<body>

<header>
<h1>Perfume Árabe Original Importación</h1>

<div class="header-right">

<a href="https://www.instagram.com/c_masala" target="_blank" class="instagram">Instagram</a>

<a href="https://www.facebook.com/bsindiamexico/" target="_blank" class="facebook">Facebook</a>

<a href="https://wa.me/524421311997" target="_blank" class="whatsapp">WhatsApp</a>

<a href="tel:+524421311997" class="phone">📞 Llamar</a>

<span class="direccion" onclick="window.open('https://www.google.com/maps/search/?api=1&query=Soriana+200+12+de+Octubre+Local+22+Nuevo+Celaya+38027+Celaya+Gto+Mexico')">
📍 Soriana 200, 12 de Octubre Local 22, Nuevo Celaya, 38027 Celaya, Gto. Mexico
</span>

</div>
</header>

<div id="categories">
<button onclick="filterCategory('All')">Todos</button>
<button onclick="filterCategory('Dama')">Dama</button>
<button onclick="filterCategory('Caballero')">Caballero</button>
<button onclick="filterCategory('Unisex')">Unisex</button>
</div>

<div id="products"></div>

<div id="cart-toggle">🛒</div>

<div id="cart">
<button id="cart-close">❌</button>
<h3>Carrito</h3>
<div id="cart-items"></div>
<p>🚚 Envío: $200 (24 horas)</p>
<p>🔄 No hay devoluciones</p>
<p>Total: $<span id="total">0</span></p>
<a id="checkout" target="_blank">
<button style="background:#25D366;color:white;">Comprar por WhatsApp</button>
</a>
</div>

<!-- REVIEWS -->
<div id="reviews">
<h3>Opiniones de Clientes ⭐</h3>

<div id="reviews-list"></div>

<input id="name" placeholder="Tu nombre">
<select id="stars">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>
<input id="comment" placeholder="Tu comentario">
<button onclick="addReview()">Enviar Reseña</button>
</div>

<script>

const sheetURL="https://opensheet.elk.sh/1jTuw2fhX_7hVQvp8EsPFIo4b37si6xdqGKDTDT1ZSW8/Perfumes";

let productsData=[], cart=[], shipping=200;

// DEMO REVIEWS (पहले से दिखेंगे)
let reviewsData = JSON.parse(localStorage.getItem("reviews")) || [
 {n:"Carlos",c:"Excelente perfume 🔥",s:5},
 {n:"Maria",c:"Muy rico aroma 😍",s:5},
 {n:"Juan",c:"Buena calidad",s:4}
];

function renderReviews(){
 let html="";
 reviewsData.forEach(r=>{
  html+=`<div class="review"><b>${r.n}</b> ${"⭐".repeat(r.s)}<br>${r.c}</div>`;
 });
 document.getElementById("reviews-list").innerHTML=html;
}
renderReviews();

function addReview(){
 let n=document.getElementById("name").value;
 let c=document.getElementById("comment").value;
 let s=parseInt(document.getElementById("stars").value);

 if(!n || !c) return alert("Completa todo");

 reviewsData.push({n,c,s});
 localStorage.setItem("reviews",JSON.stringify(reviewsData));
 renderReviews();

 document.getElementById("name").value="";
 document.getElementById("comment").value="";
}

function getPrice(item){
 let p=item["Precio"]||"0";
 p=p.toString().replace(/,/g,'');
 return Number(p)||0;
}

fetch(sheetURL).then(r=>r.json()).then(data=>{
 productsData=data;
 renderProducts(data);
});

function renderProducts(data){
 let html="";
 data.forEach(item=>{
 let nombre=item["Nombre"]||"Perfume";
 let precio=getPrice(item);
 let img=item["Imagen"]||"";
 let stock=parseInt(item["Stock"])||0;

 html+=`
 <div class="product">
 <img src="${img}">
 <h2>${nombre}</h2>
 <p>$${precio}</p>
 <p>Disponible: ${stock} piezas</p>
 <button onclick="addToCart('${nombre}',${precio},${stock})">Agregar</button>
 </div>`;
 });

 document.getElementById("products").innerHTML=html;
}

function addToCart(name,price,stock){
 let count=cart.filter(i=>i.name===name).length;

 if(count>=stock){
  alert("No hay más stock");
  return;
 }

 cart.push({name,price});
 renderCart();
 document.getElementById("cart").classList.add("open");
}

function renderCart(){
 let html="",total=0;

 cart.forEach((i,index)=>{
  total+=i.price;
  html+=`${i.name} $${i.price} <button onclick="remove(${index})">❌</button><br>`;
 });

 total+=shipping;

 document.getElementById("cart-items").innerHTML=html;
 document.getElementById("total").innerText=total;

 let msg="Hola quiero comprar:%0A";
 cart.forEach(i=>msg+=i.name+" $"+i.price+"%0A");
 msg+="Total:"+total;

 document.getElementById("checkout").href="https://wa.me/524421311997?text="+msg;
}

function remove(i){cart.splice(i,1);renderCart();}

document.getElementById("cart-toggle").onclick=
()=>document.getElementById("cart").classList.toggle("open");

document.getElementById("cart-close").onclick=
()=>document.getElementById("cart").classList.remove("open");

function filterCategory(cat){
 if(cat=="All") renderProducts(productsData);
 else renderProducts(productsData.filter(p=>p["Categoria"]==cat));
}

</script>

</body>
</html>
